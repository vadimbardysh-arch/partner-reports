name: Update Partner Reports

on:
  schedule:
    # Daily 08:00 UTC (11:00 Kyiv) — Smart Promo dashboard + weekly reports on Mondays
    - cron: '0 8 * * *'
    # Monday 10:00 UTC (13:00 Kyiv EEST) — Sponsored Listings dashboard
    - cron: '0 10 * * 1'
    # Backup Monday: 13:00 UTC (16:00 Kyiv) — runs if primary was skipped
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Check if reports already updated today
        id: check
        run: |
          TODAY=$(date -u +'%Y-%m-%d')
          DOW=$(date -u +'%u')
          LAST_COMMIT_MSG=$(git log -1 --format='%s')
          if [[ "$LAST_COMMIT_MSG" == *"Auto-update reports ${TODAY}"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✓ Reports already updated today ($TODAY). Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "→ Reports not yet updated today ($TODAY). Proceeding."
          fi
          if [[ "$DOW" == "1" ]]; then
            echo "is_monday=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_monday=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r scripts/requirements.txt

      - name: Generate Smart Promo Traits dashboard data
        if: steps.check.outputs.skip != 'true'
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/generate_smart_promo.py

      - name: Generate single-provider reports (Monday / manual only)
        if: steps.check.outputs.skip != 'true' && (steps.check.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch')
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/generate_reports.py

      - name: Generate BUREK multi-store report (Monday / manual only)
        if: steps.check.outputs.skip != 'true' && (steps.check.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch')
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/generate_burek.py

      - name: Generate Kulinichi multi-store report (Monday / manual only)
        if: steps.check.outputs.skip != 'true' && (steps.check.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch')
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/generate_kulinichi.py

      - name: Generate Sponsored Listings dashboard (Monday / manual only)
        if: steps.check.outputs.skip != 'true' && (steps.check.outputs.is_monday == 'true' || github.event_name == 'workflow_dispatch')
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/generate_sponsored_listings.py

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update reports $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: generate
    if: failure()
    steps:
      - name: Send failure notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "⚠️ Partner Reports update FAILED\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nTriggered by: ${{ github.event_name }}"
            }
